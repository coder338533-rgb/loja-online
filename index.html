<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Loja Online</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background: #333; color: white; padding: 1rem; text-align: center; }
        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; padding: 2rem; }
        .product { border: 1px solid #ddd; padding: 1rem; text-align: center; }
        .product img { width: 100%; height: 200px; object-fit: cover; }
        .cart { position: fixed; top: 10px; right: 10px; background: white; border: 1px solid #333; padding: 1rem; }
        button { background: #28a745; color: white; border: none; padding: 0.5rem 1rem; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <h1>Minha Loja Online</h1>
        <nav>
            <a href="#">Home</a> | <a href="#">Produtos</a> | <a href="#">Contato</a>
        </nav>
    </header>
    <main>
        <section class="products" id="products">
            <!-- Products will be loaded by JS -->
        </section>
    </main>
    <div class="cart" id="cart">
        <h2>Carrinho (<span id="cart-count">0</span>)</h2>
        <ul id="cart-items"></ul>
        <p>Total: R$ <span id="cart-total">0</span></p>
        <button onclick="checkout()">Finalizar Compra</button>
    </div>

    <script>
        const products = [
            { id: 1, name: 'Camiseta', price: 49.99, img: 'https://via.placeholder.com/300x200?text=Camiseta' },
            { id: 2, name: 'Calça Jeans', price: 89.99, img: 'https://via.placeholder.com/300x200?text=Calca' },
            { id: 3, name: 'Tênis', price: 129.99, img: 'https://via.placeholder.com/300x200?text=Tenis' },
            { id: 4, name: 'Boné', price: 29.99, img: 'https://via.placeholder.com/300x200?text=Bone' }
        ];

        let cart = [];

        function renderProducts() {
            const container = document.getElementById('products');
            container.innerHTML = products.map(p => `
                <div class="product">
                    <img src="${p.img}" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <p>R$ ${p.price.toFixed(2)}</p>
                    <button onclick="addToCart(${p.id})">Adicionar ao Carrinho</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCart();
        }

        function updateCart() {
            const count = document.getElementById('cart-count');
            const items = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');

            count.textContent = cart.length;
            items.innerHTML = cart.map(item => `<li>${item.name} - R$ ${item.price.toFixed(2)}</li>`).join('');
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            totalEl.textContent = total.toFixed(2);
        }

        function checkout() {
            if (cart.length === 0) {
                alert('Carrinho vazio!');
                return;
            }
            alert('Compra finalizada! Obrigado por comprar na nossa loja.');
            cart = [];
            updateCart();
        }

        renderProducts();
    </script>
</body>
</html>
